<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      --bg: #2c2c2c;
      --calc-bg: #2c2c2c;
      --btn: #444;
      --btn-hover: #666;
      --accent: #ff9500;
      --accent-hover: #e48a00;
      --text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      font-family: "Segoe UI", sans-serif;
    }
    .calculator {
      background: var(--calc-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      width: 270px;
    }
    #display {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: var(--text);
      font-size: 24px;
      text-align: right;
      padding: 10px;
      margin-bottom: 15px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }
    button {
      background: var(--btn);
      color: var(--text);
      font-size: 20px;
      padding: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--btn-hover); }
    .equal       { grid-row: span 2; background: var(--accent); }
    .equal:hover { background: var(--accent-hover); }
    .zero        { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <input id="display" type="text" disabled />
    <div class="buttons">
      <button data-key="C">C</button>
      <button data-key="/">÷</button>
      <button data-key="*">×</button>
      <button data-key="Backspace">⌫</button>

      <button data-key="7">7</button>
      <button data-key="8">8</button>
      <button data-key="9">9</button>
      <button data-key="-">−</button>

      <button data-key="4">4</button>
      <button data-key="5">5</button>
      <button data-key="6">6</button>
      <button data-key="+">+</button>

      <button data-key="1">1</button>
      <button data-key="2">2</button>
      <button data-key="3">3</button>
      <button class="equal" data-key="=">=</button>

      <button class="zero" data-key="0">0</button>
      <button data-key=".">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    const calc   = document.querySelector(".calculator");

    let input = "";

    // Update the display
    const refresh = () => (display.value = input || "0");

    // Handle button clicks
    calc.addEventListener("click", e => {
      if (e.target.tagName !== "BUTTON") return;
      processKey(e.target.dataset.key);
    });

    // Handle keyboard input
    document.addEventListener("keydown", e => {
      const key = e.key === "Enter" ? "=" : e.key;
      const allowed = "0123456789+-*/.=BackspacecC";
      if (allowed.includes(key)) processKey(key);
    });

    function processKey(key) {
      if (key === "=") {
        try { input = String(eval(input || "0")); }
        catch { input = "Error"; }
      } else if (key === "C" || key === "c") {
        input = "";
      } else if (key === "Backspace") {
        input = input.slice(0, -1);
      } else {
        input += key;
      }
      refresh();
    }

    refresh(); // initialize
  </script>
</body>
</html>
